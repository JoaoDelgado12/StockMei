<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="../css/reset.css"/>
        <link rel="stylesheet" type="text/css" href="../css/padraoPagina.css"> 
        <link rel="stylesheet" type="text/css" href="../css/color.css"/>
        <link rel="stylesheet" type="text/css" href="../css/controleestoque.css"/>
        
        <title>Estoque</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header>
            
        </header>
        <main>
            <section id="sec-resumoEstoque">
                <div class="card-resumo" >
                    <h2 class="titulo-card">Entrada</h2>
                    <p class="valor-card">100 R$</p>
                </div>
                <div class="card-resumo" >
                    <h2 class="titulo-card">Saída</h2>
                    <p class="valor-card">80 R$</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Total</h2>
                    <p class="valor-card">20 R$</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card"> Vendas </h2>
                    <p class="valor-card"> 10 <p>
                </div>
            </section>
            
            <section id="sec-filtro">
                <div id="filtro">
                    <div class="grupo-filtro">
                        <input type="date" id="filtroData" class="input-filtro">
                    </div>
                    <div class="grupo-filtro">
                        <input type="text" class="input-filtro" id="pesq-nome"  placeholder="Digite o nome do produto" >
                        <button class="btn-pesquisa">
                            <img src="../IMG/busca.png" alt="um icone de busca.">
                        </button>
                    </div>
                    <div class="grupo-filtro">
                        <select id="tipoMovimentacao" class="select-filtro">
                            <option value="entrada">Entrada</option>
                            <option value="saida">Saída</option>
                        </select>
                        <label for="tipoMovimentacao">Tipo</label>
                    </div>
                </div>
            </section>
            
            <section id="sec-tabelaEstoque">
                <div id="center-tabela-wrapper">
                    <div class="tabela-wrapper">
                        <table id="tabelaEstoque">
                            <thead>
                                <tr>
                                    <th>Código de barras</th>
                                    <th>Nome</th>
                                    <th>Fabricante</th>
                                    <th>Marca</th>
                                    <th>Quantidade</th>
                                    <th>Valor unitário</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody id="corpoTabela">
                                <tr class="linha-item">
                                    <td>123456789</td>
                                    <td>Mouse</td>
                                    <td>Logitech</td>
                                    <td>MX</td>
                                    <td>10</td>
                                    <td>R$80,00</td>
                                    <td>R$800,00</td>
                                </tr>
                                <tr class="linha-item">
                                    <td>123456780</td>
                                    <td>Teclado</td>
                                    <td>Logitech</td>
                                    <td>MXC</td>
                                    <td>10</td>
                                    <td>R$90,00</td>
                                    <td>R$900,00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

                </div>
            </section> comment -->
        </main>
        <footer>

        </footer>
    </body>
</html>
