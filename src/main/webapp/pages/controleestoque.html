<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="../css/reset.css"/>
        <link rel="stylesheet" type="text/css" href="../css/padraoPagina.css"> 
        <link rel="stylesheet" type="text/css" href="../css/color.css"/>
        <link rel="stylesheet" type="text/css" href="../css/controleestoque.css"/>
        
        <title>Estoque</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
    <header> 
        <div class="grupo-cadastro">
            <div class="secao-cadastro-off">
                <ul>
                    <li> <a href="./pagesCadastro/cadastroProduto.html">Cadastrar Produto</a> </li>
                    <li> <a href="./pagesCadastro/cadastroUsuario.html">Cadastrar Usuario</a> </li>
                </ul>
            </div>

            <!-- Modo cadastro off-->
            <button class="header-cadastro">
                <img src="../IMG/plus.svg" alt="botão de cadastrar produto"> 
            </button>
        </div>

        <div class="user-profile-container">
            <!-- Perfil -->
            <button class="user-profile">
                <img src="../IMG/userDefault.svg" alt="Foto de perfil do usuário">
            </button>

            <!-- Menu -->
            <div class="profile-off">
                <ul>
                    <li> <a class="btn-invPerfil">Perfil</a> </li>
                        <li> <form action="../logout" method="POST">
                            <button type="submit" class="btn-invPerfil">Sair do Sistema</button>
                            </form> 
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <main>
        <section id="cards">
            <div class="card-resumo">
                <h3 class="titulo-card">Entrada</h3>
                <p class="valor-card" id="cardEntrada">0</p>
            </div>

            <div class="card-resumo">
                <h3 class="titulo-card">Saída</h3>
                <p class="valor-card">0</p>
            </div>

            <div class="card-resumo">
                <h3 class="titulo-card">Total</h3>
                <p class="valor-card" id="cardTotal">0</p>
            </div>
        </section>
        <section id="agrupar-estoque">
            <section id="filtro">
                <div id="filtro-container">
                    <div class="grupo-filtro">
                        <label for="filtroData">Data</label>
                        <input type="date" id="filtroData" class="input-filtro">
                    </div>
                    <div class="grupo-filtro">
                        <label for="tipoMovimentacao">Tipo</label>
                        <select id="tipoMovimentacao" class="select-filtro">
                            <option value="">Selecione uma opção</option>
                            <option value="entrada">Entrada</option>
                            <option value="saida">Saída</option>
                        </select>
                    </div>
                    <div class="grupo-filtro pesquisa-nome">
                        <label for="pesquisarNome">Nome do produto</label>
                        <input type="text" id="pesquisarNome" class="input-filtro" placeholder="Digite o nome do produto">
                    </div>
                    <div class="grupo-filtro botao-pesquisa">
                        <button class="btn-pesquisa" id="btn-pesquisar">
                            <img src="../IMG/busca.png" >
                        </button>
                    </div>
                </div>
            </section>
            <section id="tabelaEstoqueContainer">
                <div class="tabela-wrapper">
                    <table id="tabelaEstoque">
                        <thead>
                            <tr>
                                <th>Código de barras</th>
                                <th>Nome</th>
                                <th>Fabricante</th>
                                <th>Marca</th>
                                <th>Quantidade</th>
                                <th>Valor unitário</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela"></tbody>
                    </table>
                </div>
            </section>
            <section id="paginacao">
                <button id="btnVoltarPag" class="btn-paginacao">
                    <img src="" alt="Voltar">
                </button>
                <div class="controle-paginacao">
                    <input id="pagina" placeholder="Pag" type="number">
                </div>
                <button id="btnProximoPag" class="btn-paginacao">
                    <img src="" alt="Próximo">
                </button>
            </section>
        </section>
    </main>

    <footer>

    </footer>
    <script src="../js/filtro.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../js/padraoPagina.js"> </script> 
</body>
</html>
