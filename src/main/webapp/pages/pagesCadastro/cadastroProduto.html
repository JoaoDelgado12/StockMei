<html>
    <head>
        <link rel="stylesheet" href="../../css/reset.css"/>
        <link rel="stylesheet" href="../../css/color.css"/>
        <link rel="stylesheet" href="../../css/cadastro.css"/>
        <title>Cadastro Produto</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloCadastro">StockMei</h1>
            <nav>
                <ul>
                    <li><a href="../menu.html" >Inicio</a></li>
                    <li><a href="#" >Gerenciamento</a></li>
                </ul>
            </nav>
        </header>
        <main id="main">
            <form action="../cadastro/produto" method="POST">
                <div class="container">
                    <div class="dadosPessoais">
                        <label for="nome">Nome</label>
                        <input type="text" name="nome" id="nome" placeholder="Digite o nome do produto" />
                        <label for="quantidade">Quantidade</label>
                        <input type="text" name="quantidade" id="quantidade" placeholder="Digite a quantidade inicial" />
                        <label for="precoVendaUni">Preço de compra (unidade)</label>
                        <input type="text" name="precoVendaUni" id="precoVendaUni" placeholder="Digite o preco da unidade" />
                        <label for="marca">Marca</label>
                        <input type="text" name="marca" id="marca" placeholder="Digite a marca" />
                    </div>
                    <div class="btn">
                        <button type="submit">Cadastrar</button>
                    </div>
                </div>
            </form>
        </main>
    </body>
</html>
