<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="../../css/reset.css"/>
        <link rel="stylesheet" href="../../css/color.css"/>
        <link rel="stylesheet" href="../../css/cadastroProduto.css"/>
        <title>Cadastro Produto</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloCadastro">StockMei</h1>
            <nav>
                <ul>
                    <li><a href="../menu.html" >Inicio</a></li>
                </ul>
            </nav>
        </header>
        <main id="main">
            <form>
                <div class="containerPrincipal">
                    <div class="dadosProduto">
                        <label for="nome">Nome</label>
                        <input type="text"  id="nome" placeholder="Digite o nome do produto" />
                        <label for="marca">Marca</label>
                        <input type="text" id="marca" placeholder="Digite a marca" />
                        <label for="fornecedor">Fornecedor</label>
                        <input type="text" id="fornecedor" placeholder="Digite o nome do fornecedor" />
                        <label for="quantidade">Quantidade</label>
                        <input type="text" id="quantidade" placeholder="Digite a quantidade em estoque" />
                        <label for="precoVendaUni">Preço de venda (unidade)</label>
                        <input type="text" id="precoVendaUni" placeholder="Digite o preco da unidade" />
                    </div>
                    <div class="btn">
                        <button id="cadastrar">Cadastrar</button>
                        <button id="novoEstoque">Novo estoque</button>
                    </div>
                </div>


            </form>
        </main>
    </body>
</html>
