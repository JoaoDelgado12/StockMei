<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="../../css/reset.css"/>
        <link rel="stylesheet" href="../../css/color.css"/>
        <link rel="stylesheet" href="../../css/cadastroProduto.css"/>
        <title>Cadastro Produto</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloCadastro">StockMei</h1>
            <nav>
                <ul>
                    <li><a href="../menu.html" >Inicio</a></li>
                </ul>
            </nav>
        </header>
        <main id="main">
            <div class="container">
                <div class="containerPrincipal">
                    <div class="dadosProduto">
                        <label for="nome">Nome</label>
                        <input type="text"  id="nome" placeholder="Nome do produto" />
                        <div class="containerMarca">
                            <label for="marca">Marca</label>
                            <input type="text" id="marca" placeholder="Nome da marca" />
                            <ul id="janelaAuto"></ul>
                        </div>
                        <label for="fornecedor">Fornecedor</label>
                        <input type="text" id="fornecedor" placeholder="Nome do fornecedor" />
                        <label for="quantidade">Quantidade</label>
                        <input type="text" id="quantidade" placeholder="Quantidade atual do estoque" />
                        <label for="quantidadeMin">Quantidade mínima</label>
                        <input type="text" id="quantidadeMin" placeholder="Quantidade para reposição" />
                        <label for="precoVendaUni">Preço de venda (unidade)</label>
                        <input type="text" id="precoVendaUni" placeholder="Preco de venda do produto" />
                        <label for="localArmazenamento">Local de armazenamento</label>
                        <input type="text" id="localArmazenamento" placeholder="Local de armazenamento" />
                    </div>
                    <div class="btn">
                        <button id="cadastrar">Cadastrar</button>
                        <button id="addEstoque">add estoque</button>
                    </div>
                </div>
                <div class="containerEstoque">
                    <label for="precoCompraUni">Preco de Compra (unidade) </label>
                    <input type="text" id="precoCompraUni" placeholder="Preço da compra do produto"/>
                    <label for="quantidade"> Quantidade </label>
                    <input type="text" id="quantidade" placeholder="Quantidade da compra"/>
                    <label for="desconto"> Desconto </label>
                    <input type="text" id="number" placeholder="Desconto da compra"/>
                </div>
            </div>
        </main>
        <script src="../../js/cadastroProduto.js"></script>
    </body>
</html>
